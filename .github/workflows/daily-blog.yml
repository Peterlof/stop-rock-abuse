name: Daily Rock News Blog

on:
  schedule:
    - cron: '0 8 * * *'  # 8:00 AM UTC daily
  workflow_dispatch: {}    # Manual trigger for testing

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate blog posts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate-blog.py

      - name: Commit and push
        run: |
          git config user.name "Rock News Bot"
          git config user.email "bot@stoprockabuse.com"
          git add blog/posts.json search-index.json
          git diff --staged --quiet || git commit -m "Daily rock news: $(date +%Y-%m-%d)"
          git push

      - name: Send newsletter
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python scripts/send-newsletter.py
